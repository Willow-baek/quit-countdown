<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0e0e0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/quit-icon.svg" type="image/svg+xml">
<title>QUIT. 퇴사까지</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;700&family=Inter:wght@300;400;700&display=swap');

  :root {
    --bg: #0e0e0e;
    --accent: #ff3c3c;
    --accent2: #ff8c42;
    --text: #f0ece4;
    --muted: #555;
    --future: #1e1e1e;
    --today-border: #ff8c42;
    --off-color: #1e3a2a;
    --annual-color: #1a2e3a;
    --surface: #181818;
    --border: #2a2a2a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', 'Inter', sans-serif;
    min-height: 100vh;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* ══════════════ LANG PICKER ══════════════ */
  .lang-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
  }
  .lang-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    color: var(--accent);
    letter-spacing: 4px;
    margin-bottom: 8px;
  }
  .lang-tagline {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 3px;
    margin-bottom: 60px;
    text-align: center;
  }
  .lang-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    margin-bottom: 16px;
  }
  .lang-btns {
    display: flex;
    gap: 14px;
  }
  .lang-btn {
    width: 130px;
    padding: 20px 0;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .lang-btn:hover {
    border-color: var(--accent2);
    color: var(--text);
    background: #1e1e1e;
  }
  .lang-btn .flag { font-size: 28px; }
  .lang-btn .lang-name { font-size: 13px; letter-spacing: 1px; }
  .lang-btn .lang-sub  { font-size: 10px; color: #444; letter-spacing: 1px; }

  /* ══════════════ SETUP ══════════════ */
  .setup-wrap {
    max-width: 440px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }
  .setup-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--accent);
    letter-spacing: 3px;
    margin-bottom: 6px;
  }
  .setup-sub { font-size: 12px; color: var(--muted); letter-spacing: 2px; margin-bottom: 32px; }

  .cache-warning {
    background: #1a1200;
    border: 1px solid #4a3200;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 28px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .cache-warning-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
  .cache-warning-text { font-size: 12px; color: #c8a04a; line-height: 1.75; }
  .cache-warning-text strong { color: #ffcc66; }

  .setup-section { margin-bottom: 28px; }
  .setup-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }
  .setup-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .setup-input:focus { border-color: var(--accent2); }
  .setup-input::placeholder { color: #333; }
  .field-note {
    margin-top: 8px;
    font-size: 10px;
    line-height: 1.6;
    color: var(--muted);
  }
  .date-select-grid {
    display: grid;
    grid-template-columns: 1.1fr 1fr 0.9fr;
    gap: 8px;
  }
  .date-select {
    appearance: none;
    min-width: 0;
    cursor: pointer;
  }
  .date-select.placeholder { color: #444; }
  .date-select option { background: var(--surface); color: var(--text); }

  .dow-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .dow-btn {
    aspect-ratio: 1;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: #444;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .dow-btn.selected { background: #2a1a1a; border-color: var(--accent); color: var(--accent); font-weight: 700; }

  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px;
  }
  .field-note + .toggle-row { margin-top: 12px; }
  .toggle-label-text { font-size: 13px; color: var(--text); }
  .toggle-label-sub  { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .switch { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0; background: #2a2a2a;
    border-radius: 24px; cursor: pointer; transition: background 0.2s;
  }
  .slider:before {
    content: ''; position: absolute; width: 18px; height: 18px;
    border-radius: 50%; background: #555; top: 3px; left: 3px;
    transition: transform 0.2s, background 0.2s;
  }
  input:checked + .slider { background: #2a1a1a; }
  input:checked + .slider:before { transform: translateX(20px); background: var(--accent2); }

  .setup-btn {
    width: 100%; background: var(--accent); border: none; border-radius: 12px;
    padding: 16px; color: #fff; font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 3px; cursor: pointer; transition: opacity 0.2s; margin-top: 8px;
  }
  .setup-btn:hover { opacity: 0.85; }
  .back-lang-btn {
    background: none; border: none; color: var(--muted);
    font-size: 12px; letter-spacing: 2px; cursor: pointer;
    margin-bottom: 24px; display: flex; align-items: center; gap: 6px;
    font-family: inherit; padding: 0;
  }
  .back-lang-btn:hover { color: var(--text); }
  .setup-err { font-size: 12px; color: var(--accent); margin-top: 8px; min-height: 18px; }

  /* ══════════════ MAIN ══════════════ */
  .main-wrap { padding-bottom: 80px; }

  .header {
    padding: 28px 20px 20px;
    text-align: center;
    border-bottom: 1px solid #1e1e1e;
    position: relative;
  }
  .reset-btn {
    position: absolute; top: 20px; right: 16px;
    background: none; border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 10px; color: var(--muted); font-size: 10px;
    letter-spacing: 1px; cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }
  .header-name { font-size: 11px; letter-spacing: 3px; color: var(--muted); margin-bottom: 4px; }
  .header-label { font-size: 11px; letter-spacing: 4px; color: var(--muted); margin-bottom: 4px; }
  .header-count {
    font-family: 'Bebas Neue', sans-serif; font-size: 88px;
    line-height: 1; color: var(--accent); letter-spacing: -2px;
  }
  .header-unit { font-size: 13px; color: var(--muted); letter-spacing: 2px; margin-top: 2px; }

  /* 응원 메세지 박스 */
  .cheer-box {
    margin: 18px auto 0;
    max-width: 340px;
    padding: 14px 18px;
    background: #111;
    border: 1px solid #222;
    border-radius: 12px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.75;
    font-weight: 300;
    text-align: center;
    font-style: italic;
  }
  .cheer-accent { color: var(--accent2); font-weight: 700; font-style: normal; }
  .cheer-date {
    display: block; margin-top: 8px;
    font-size: 9px; color: #333; letter-spacing: 3px;
    font-style: normal; text-transform: uppercase;
  }

  .progress-bar-wrap {
    margin: 16px auto 0; max-width: 320px;
    height: 3px; background: #1e1e1e; border-radius: 2px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px; transition: width 0.5s ease;
  }

  /* OFF DAYS */
  .offdays-panel { max-width: 480px; margin: 20px auto 0; padding: 0 16px; }
  .offdays-toggle {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; color: var(--muted);
    font-family: inherit; font-size: 12px; letter-spacing: 1px;
    cursor: pointer; display: flex; align-items: center; justify-content: space-between;
    transition: border-color 0.2s;
  }
  .offdays-toggle:hover { border-color: #3a3a3a; color: var(--text); }
  .offdays-toggle .arrow { transition: transform 0.2s; }
  .offdays-toggle.open .arrow { transform: rotate(180deg); }
  .offdays-body {
    display: none; background: #111; border: 1px solid var(--border);
    border-top: none; border-radius: 0 0 10px 10px; padding: 16px;
  }
  .offdays-body.open { display: block; }
  .input-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
  .input-row label { font-size: 11px; color: var(--muted); white-space: nowrap; min-width: 40px; }
  .date-input {
    flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 6px;
    padding: 8px 10px; color: var(--text); font-family: inherit; font-size: 13px; outline: none;
  }
  .date-input:focus { border-color: var(--accent2); }
  .type-select {
    background: #1a1a1a; border: 1px solid #333; border-radius: 6px;
    padding: 8px 8px; color: var(--text); font-family: inherit; font-size: 11px;
    outline: none; min-width: 90px;
  }
  .add-btn {
    background: var(--accent2); border: none; border-radius: 6px;
    padding: 8px 14px; color: #000; font-family: inherit;
    font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.85; }
  .offday-list { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
  .offday-item {
    display: flex; align-items: center; justify-content: space-between;
    background: #1a1a1a; border-radius: 6px; padding: 8px 12px; font-size: 12px;
  }
  .item-left { display: flex; align-items: center; gap: 10px; }
  .offday-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 700; }
  .badge-annual { background: #1a3a50; color: #5bb8e8; }
  .badge-comp   { background: #1a3a28; color: #5be87a; }
  .remove-btn {
    background: none; border: 1px solid #333; border-radius: 4px;
    color: var(--muted); font-size: 11px; padding: 2px 8px;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .remove-btn:hover { border-color: var(--accent); color: var(--accent); }
  .empty-hint { font-size: 11px; color: #333; text-align: center; padding: 8px 0; }

  /* CALENDAR */
  .months { padding: 20px 16px 0; max-width: 480px; margin: 0 auto; }
  .month-block { margin-bottom: 32px; }
  .month-label {
    font-family: 'Bebas Neue', sans-serif; font-size: 26px;
    color: var(--muted); letter-spacing: 2px; margin-bottom: 10px;
  }
  .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .day-cell {
    aspect-ratio: 1; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    font-size: 12px; position: relative; cursor: default;
  }
  .day-cell.work-future { background: var(--future); border: 1px solid #2a2a2a; color: #555; }
  .day-cell.work-today {
    background: var(--future); border: 2px solid var(--today-border);
    color: var(--today-border); font-weight: 700;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 8px rgba(255,140,66,0.15); }
    50%      { box-shadow: 0 0 18px rgba(255,140,66,0.45); }
  }
  .day-cell.off { background: transparent; color: #2e2e2e; border: none; font-size: 10px; }
  .day-cell.holiday-off { background: transparent; color: #333; border: none; font-size: 10px; }
  .day-cell.annual-off {
    background: var(--annual-color); border: 1px solid #1e4060;
    color: #5bb8e8; font-size: 9px; font-weight: 700;
  }
  .day-cell.comp-off {
    background: var(--off-color); border: 1px solid #1e5030;
    color: #5be87a; font-size: 9px; font-weight: 700;
  }
  .day-num {
    font-size: 9px; position: absolute; bottom: 3px; right: 4px;
    opacity: 0.45; font-weight: 300;
  }
  .day-cell.work-today .day-num,
  .day-cell.annual-off .day-num,
  .day-cell.comp-off .day-num { opacity: 0.65; }
  .dow-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 5px; }
  .dow-cell { text-align: center; font-size: 9px; color: #333; padding: 2px 0; }
  .dow-cell.sun { color: #5a2a2a; }
  .dow-cell.sat { color: #2a3a5a; }

  /* LEGEND */
  .legend {
    display: flex; gap: 12px; justify-content: center;
    flex-wrap: wrap; margin: 14px auto 0; max-width: 480px; padding: 0 16px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .ld-today  { background: #1e1e1e; border: 1px solid var(--today-border); }
  .ld-work   { background: #1e1e1e; border: 1px solid #2a2a2a; }
  .ld-annual { background: #1a3a50; border: 1px solid #1e4060; }
  .ld-comp   { background: #1e3a2a; border: 1px solid #1e5030; }

  .footer-area { text-align: center; padding: 8px 20px 0; }
  .last-day-badge {
    display: inline-block; margin-top: 20px; padding: 6px 18px;
    border: 1px solid var(--accent); border-radius: 20px;
    font-size: 11px; color: var(--accent); letter-spacing: 2px;
  }
  .footer-note { font-size: 11px; color: #2e2e2e; margin-top: 8px; letter-spacing: 1px; }
</style>
</head>
<body>

<!-- ══ 1. LANGUAGE PICKER ══ -->
<div class="screen active" id="screen-lang">
  <div class="lang-screen">
    <div class="lang-logo">QUIT.</div>
    <div class="lang-tagline">COUNTDOWN TO FREEDOM</div>
    <div class="lang-btns" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:300px;">
      <button class="lang-btn" onclick="pickLang('ko')">
        <span class="flag">🇰🇷</span>
        <span class="lang-name">한국어</span>
        <span class="lang-sub">Korean</span>
      </button>
      <button class="lang-btn" onclick="pickLang('en')">
        <span class="flag">🌏</span>
        <span class="lang-name">English</span>
        <span class="lang-sub">영어</span>
      </button>
      <button class="lang-btn" onclick="pickLang('ja')">
        <span class="flag">🇯🇵</span>
        <span class="lang-name">日本語</span>
        <span class="lang-sub">Japanese</span>
      </button>
      <button class="lang-btn" onclick="pickLang('es')">
        <span class="flag">🇪🇸</span>
        <span class="lang-name">Español</span>
        <span class="lang-sub">Spanish</span>
      </button>
    </div>
  </div>
</div>

<!-- ══ 2. SETUP SCREEN ══ -->
<div class="screen" id="screen-setup">
  <div class="setup-wrap">
    <button class="back-lang-btn" onclick="showScreen('lang')">← <span id="s-back-label"></span></button>
    <div class="setup-logo">QUIT.</div>
    <div class="setup-sub" id="s-subtitle"></div>

    <div class="cache-warning">
      <div class="cache-warning-icon">⚠️</div>
      <div class="cache-warning-text" id="s-cache-warn"></div>
    </div>

    <div class="setup-section">
      <label class="setup-label" id="s-label-name"></label>
      <input class="setup-input" id="s-name" type="text" maxlength="20">
    </div>

    <div class="setup-section">
      <label class="setup-label" id="s-label-lastday"></label>
      <div class="date-select-grid">
        <select class="setup-input date-select placeholder" id="s-lastday-year"></select>
        <select class="setup-input date-select placeholder" id="s-lastday-month"></select>
        <select class="setup-input date-select placeholder" id="s-lastday-day"></select>
      </div>
    </div>

    <div class="setup-section">
      <label class="setup-label" id="s-label-paiddays"></label>
      <input class="setup-input" id="s-paid-days" type="number" min="0" step="1" inputmode="numeric" value="0">
      <div class="field-note" id="s-paid-days-note"></div>
    </div>

    <div class="setup-section">
      <label class="setup-label" id="s-label-offdays"></label>
      <div class="dow-grid" id="dow-grid"></div>
    </div>

    <div class="setup-section">
      <label class="setup-label" id="s-label-holiday"></label>
      <select class="setup-input" id="s-holiday-country"></select>
      <div class="field-note" id="s-holiday-country-note"></div>
      <div class="toggle-row">
        <div>
          <div class="toggle-label-text" id="s-holiday-title"></div>
          <div class="toggle-label-sub" id="s-holiday-sub"></div>
        </div>
        <label class="switch">
          <input type="checkbox" id="s-holiday" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="setup-err" id="setup-err"></div>
    <button class="setup-btn" id="s-start-btn" onclick="startApp()"></button>
  </div>
</div>

<!-- ══ 3. MAIN SCREEN ══ -->
<div class="screen" id="screen-main">
  <div class="main-wrap">

    <div class="header">
      <button class="reset-btn" id="m-settings-btn" onclick="resetApp()"></button>
      <div class="header-name" id="header-name"></div>
      <div class="header-label" id="m-header-label"></div>
      <div class="header-count" id="remaining-count">—</div>
      <div class="header-unit" id="m-header-unit"></div>
      <div class="cheer-box" id="cheer-box">
        <span id="cheer-text"></span>
        <span class="cheer-date" id="cheer-date"></span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="offdays-panel">
      <button class="offdays-toggle" id="panel-toggle" onclick="togglePanel()">
        <span id="m-panel-label"></span>
        <span class="arrow">▾</span>
      </button>
      <div class="offdays-body" id="panel-body">
        <div class="input-row">
          <label id="m-date-label"></label>
          <input type="date" class="date-input" id="offday-date">
          <select class="type-select" id="offday-type">
            <!-- JS로 옵션 삽입 -->
          </select>
          <button class="add-btn" id="m-add-btn" onclick="addOffDay()"></button>
        </div>
        <div class="offday-list" id="offday-list"></div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot ld-today"></div><span id="lg-today"></span></div>
      <div class="legend-item"><div class="legend-dot ld-work"></div><span id="lg-work"></span></div>
      <div class="legend-item"><div class="legend-dot ld-annual"></div><span id="lg-annual"></span></div>
      <div class="legend-item"><div class="legend-dot ld-comp"></div><span id="lg-comp"></span></div>
    </div>

    <div class="months" id="months-container"></div>

    <div class="footer-area">
      <div class="last-day-badge" id="footer-badge"></div>
      <div class="footer-note" id="footer-note"></div>
    </div>

  </div>
</div>

<script>
// ══════════════════════════════════════════
//  i18n — 텍스트 모음
// ══════════════════════════════════════════
const T = {
  ko: {
    backLabel:      '언어 선택',
    subtitle:       '퇴사 카운트다운 · 나만의 설정',
    cacheWarn:      '<strong>⚠ 데이터 저장 안내</strong><br>설정과 휴무 기록은 이 브라우저에 저장돼요. <strong>브라우저 캐시나 사이트 데이터를 삭제하면 초기화</strong>되니 주의해요.',
    labelName:      '이름 (선택)',
    placeholderName:'예: Willow',
    labelLastday:   '마지막 출근일',

// ══ 상태 ══
let lang = 'ko';
let cfg  = null;
let userOffDays = {};
let TODAY = null;

// ══ 날짜별 시드 랜덤 (오늘 날짜 기반 — 하루 동안 같은 메세지) ══
function seedRandom(max) {
  const d = new Date();
  const seed = d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
  return seed % max;
}

// ══ 유틸 ══
function dateKey(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function keyToDate(k) {
  const [y,m,d] = k.split('-').map(Number);
  return new Date(y, m-1, d);
}
function sameDay(a,b) {
  return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
}
function addDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function getLocale() {
  return ({ ko: 'ko-KR', en: 'en-US', ja: 'ja-JP', es: 'es-ES' })[lang] || 'en-US';
}
function formatDateForLang(d) {
  return d.toLocaleDateString(getLocale(), { year: 'numeric', month: 'long', day: 'numeric' });
}
function defaultHolidayCountryForLang(l) {
  return ({ ko: 'kr', en: 'us', ja: 'jp', es: 'es' })[l] || 'none';
}
function getHolidayCountryLabel(code) {
  const labels = T[lang].holidayCountries || T.en.holidayCountries;
  return labels[code] || labels.none;
}
function getHolidayCountry() {
  return cfg?.holidayCountry || 'kr';
}
function isHolidayDate(d) {
  const country = getHolidayCountry();
  if (!cfg?.useHoliday || country === 'none') return false;
  return (HOLIDAYS_2026[country] || HOLIDAYS_2026.none).has(dateKey(d));
}
function normalizeOffDows(offDows, savedLang) {
  if (savedLang === 'ko' && Array.isArray(offDows) && offDows.length === 2 && offDows.includes(0) && offDows.includes(4)) {
    return [0, 6];
  }
  return Array.isArray(offDows) ? offDows : [0, 6];
}

function isBaseWorkDay(d) {
  if (cfg.offDows.includes(d.getDay())) return false;
  if (isHolidayDate(d)) return false;
  return true;
}
function isWorkDay(d) {
  if (userOffDays[dateKey(d)]) return false;
  return isBaseWorkDay(d);
}
function getPaidDaysRemaining() {
  const raw = Number(cfg?.paidDaysRemaining || 0);
  if (!Number.isFinite(raw)) return 0;
  return Math.max(0, Math.floor(raw));
}
function countScheduledPaidDays() {
  return Object.keys(userOffDays).filter(k => {
    if (userOffDays[k] !== 'annual') return false;
    const d = keyToDate(k);
    return d >= TODAY && d <= cfg.lastDay;
  }).length;
}

// ══ localStorage ══
const LS_KEY = 'quit_countdown_v1';
function saveData() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({ lang, cfg: {
      name: cfg.name,
      lastDayKey: dateKey(cfg.lastDay),
      paidDaysRemaining: getPaidDaysRemaining(),
      offDows: cfg.offDows,
      holidayCountry: getHolidayCountry(),
      useHoliday: cfg.useHoliday
    }, userOffDays }));
  } catch(e) {}
}
function loadData() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    lang = data.lang || 'ko';
    const c = data.cfg;
    cfg = {
      name: c.name,
      lastDay: keyToDate(c.lastDayKey),
      paidDaysRemaining: Number.isFinite(Number(c.paidDaysRemaining)) ? Math.max(0, Math.floor(Number(c.paidDaysRemaining))) : 0,
      offDows: normalizeOffDows(c.offDows, lang),
      holidayCountry: c.holidayCountry || 'kr',
      useHoliday: c.useHoliday
    };
    userOffDays = data.userOffDays || {};
    TODAY = new Date(); TODAY.setHours(0,0,0,0);
    return true;
  } catch(e) { return false; }
}

// ══ 화면 전환 ══
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

// ══ 언어 선택 ══
function pickLang(l) {
  lang = l;
  buildSetupUI();
  showScreen('setup');
}

function setSelectPlaceholderState(select) {
  select.classList.toggle('placeholder', !select.value);
}

function fillSelect(select, placeholder, options) {
  select.innerHTML = `<option value="">${placeholder}</option>` +
    options.map(({ value, label }) => `<option value="${value}">${label}</option>`).join('');
  setSelectPlaceholderState(select);
}

function buildLastDayControls() {
  const t = T[lang];
  const today = new Date(); today.setHours(0,0,0,0);
  const yearSelect = document.getElementById('s-lastday-year');
  const monthSelect = document.getElementById('s-lastday-month');
  const daySelect = document.getElementById('s-lastday-day');
  const years = [];
  for (let y = today.getFullYear(); y <= today.getFullYear() + 2; y++) {
    years.push({ value: String(y), label: String(y) });
  }
  const months = Array.from({ length: 12 }, (_, i) => ({
    value: String(i + 1),
    label: new Date(2026, i, 1).toLocaleDateString(getLocale(), { month: 'long' })
  }));

  fillSelect(yearSelect, t.datePartLabels.year, years);
  fillSelect(monthSelect, t.datePartLabels.month, months);
  fillSelect(daySelect, t.datePartLabels.day, []);

  const updateDays = () => {
    const y = Number(yearSelect.value);
    const m = Number(monthSelect.value);
    const previousDay = daySelect.value;
    const maxDay = y && m ? new Date(y, m, 0).getDate() : 0;
    const days = Array.from({ length: maxDay }, (_, i) => ({
      value: String(i + 1),
      label: String(i + 1)
    }));
    fillSelect(daySelect, t.datePartLabels.day, days);
    if (previousDay && Number(previousDay) <= maxDay) daySelect.value = previousDay;
    setSelectPlaceholderState(daySelect);
  };

  yearSelect.onchange = () => { setSelectPlaceholderState(yearSelect); updateDays(); };
  monthSelect.onchange = () => { setSelectPlaceholderState(monthSelect); updateDays(); };
  daySelect.onchange = () => setSelectPlaceholderState(daySelect);
}

function getSelectedLastDayValue() {
  const y = Number(document.getElementById('s-lastday-year').value);
  const m = Number(document.getElementById('s-lastday-month').value);
  const d = Number(document.getElementById('s-lastday-day').value);
  if (!y || !m || !d) return '';
  const lastDay = new Date(y, m - 1, d);
  if (lastDay.getFullYear() !== y || lastDay.getMonth() !== m - 1 || lastDay.getDate() !== d) return '';
  return dateKey(lastDay);
}

function buildHolidayCountryControl() {
  const t = T[lang];
  const select = document.getElementById('s-holiday-country');
  const defaultCountry = defaultHolidayCountryForLang(lang);
  select.innerHTML = HOLIDAY_COUNTRIES.map((code) => {
    const label = t.holidayCountries[code] || code;
    return `<option value="${code}">${label}</option>`;
  }).join('');
  select.value = defaultCountry;
  document.getElementById('s-holiday').checked = defaultCountry !== 'none';
  select.onchange = () => {
    if (select.value === 'none') document.getElementById('s-holiday').checked = false;
    if (select.value !== 'none' && !document.getElementById('s-holiday').checked) {
      document.getElementById('s-holiday').checked = true;
    }
    updateHolidaySetupText();
  };
  updateHolidaySetupText();
}

function updateHolidaySetupText() {
  const t = T[lang];
  const select = document.getElementById('s-holiday-country');
  const checkbox = document.getElementById('s-holiday');
  const code = select.value || 'none';
  checkbox.disabled = code === 'none';
  document.getElementById('s-holiday-title').textContent = t.holidayTitle;
  document.getElementById('s-holiday-sub').textContent = t.holidaySub(getHolidayCountryLabel(code));
  document.getElementById('s-holiday-country-note').textContent = t.holidayCountryNote;
}

// ══ 설정 화면 빌드 ══
function buildSetupUI() {
  const t = T[lang];
  document.getElementById('s-back-label').textContent   = t.backLabel;
  document.getElementById('s-subtitle').textContent     = t.subtitle;
  document.getElementById('s-cache-warn').innerHTML     = t.cacheWarn;
  document.getElementById('s-label-name').textContent   = t.labelName;
  document.getElementById('s-name').placeholder         = t.placeholderName;
  document.getElementById('s-label-lastday').textContent= t.labelLastday;
  buildLastDayControls();
  document.getElementById('s-label-paiddays').textContent = t.labelPaidDays;
  document.getElementById('s-paid-days').placeholder = t.placeholderPaidDays;
  document.getElementById('s-paid-days-note').textContent = t.paidDaysNote;
  document.getElementById('s-label-offdays').textContent= t.labelOffdays;
  document.getElementById('s-label-holiday').textContent= t.labelHoliday;
  buildHolidayCountryControl();
  document.getElementById('s-start-btn').textContent    = t.startBtn;
  document.getElementById('setup-err').textContent      = '';

  // 요일 버튼
  const grid = document.getElementById('dow-grid');
  grid.innerHTML = '';
  const defaults = new Set([0,6]);
  t.dowLabels.forEach((label, i) => {
    const btn = document.createElement('button');
    btn.className = 'dow-btn' + (defaults.has(i) ? ' selected' : '');
    btn.textContent = label;
    btn.onclick = () => btn.classList.toggle('selected');
    grid.appendChild(btn);
  });
}

// ══ 앱 시작 ══
function startApp() {
  const t          = T[lang];
  const nameVal    = document.getElementById('s-name').value.trim();
  const lastDayVal = getSelectedLastDayValue();
  const paidDaysRemaining = Math.max(0, Math.floor(Number(document.getElementById('s-paid-days').value) || 0));
  const holidayCountry = document.getElementById('s-holiday-country').value || 'none';
  const useHoliday = document.getElementById('s-holiday').checked && holidayCountry !== 'none';
  const errEl      = document.getElementById('setup-err');

  const dowBtns = document.querySelectorAll('#dow-grid .dow-btn');
  const offDows = [];
  dowBtns.forEach((btn, i) => { if (btn.classList.contains('selected')) offDows.push(i); });

  if (!lastDayVal)      { errEl.textContent = t.errNoDate;      return; }
  const lastDay = keyToDate(lastDayVal);
  TODAY = new Date(); TODAY.setHours(0,0,0,0);
  if (lastDay <= TODAY) { errEl.textContent = t.errPastDate;    return; }
  if (!offDows.length)  { errEl.textContent = t.errNoDow;       return; }
  if (offDows.length>=6){ errEl.textContent = t.errTooManyDow;  return; }

  errEl.textContent = '';
  cfg = { name: nameVal, lastDay, paidDaysRemaining, offDows, holidayCountry, useHoliday };
  userOffDays = {};

  buildMainUI();
  saveData();
  showScreen('main');
  renderAll();
}

function resetApp() {
  cfg = null; userOffDays = {};
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
  buildSetupUI();
  showScreen('setup');
}

// ══ 메인 UI 텍스트 세팅 ══
function buildMainUI() {
  const t = T[lang];
  document.getElementById('m-settings-btn').textContent = t.settingsBtn;
  document.getElementById('m-header-label').textContent = t.headerLabel;
  document.getElementById('m-header-unit').textContent  = t.headerUnit;
  document.getElementById('m-panel-label').textContent  = t.panelLabel;
  document.getElementById('m-date-label').textContent   = t.dateLabel;
  document.getElementById('m-add-btn').textContent      = t.addBtn;
  document.getElementById('lg-today').textContent       = t.lgToday;
  document.getElementById('lg-work').textContent        = t.lgWork;
  document.getElementById('lg-annual').textContent      = t.lgAnnual;
  document.getElementById('lg-comp').textContent        = t.lgComp;

  const lastDayKey = dateKey(cfg.lastDay);
  document.getElementById('footer-badge').textContent = t.footerBadge(formatDateForLang(cfg.lastDay));

  // 이름
  const nameEl = document.getElementById('header-name');
  const nameSuffix = { ko: '의 카운트다운', en: "'s countdown", ja: 'のカウントダウン', es: ' · cuenta regresiva' };
  nameEl.textContent = cfg.name ? cfg.name + (nameSuffix[lang] || "'s countdown") : '';

  // 날짜 선택 범위
  document.getElementById('offday-date').min = dateKey(TODAY);
  document.getElementById('offday-date').max = lastDayKey;

  // 타입 선택 옵션
  const sel = document.getElementById('offday-type');
  sel.innerHTML = `<option value="annual">${t.optAnnual}</option><option value="comp">${t.optComp}</option>`;

  // 날짜
  const now = new Date();
  const localeMap = { ko:'ko-KR', en:'en-US', ja:'ja-JP', es:'es-ES' };
  const dateStr = now.toLocaleDateString(localeMap[lang]||'en-US', {year:'numeric',month:'long',day:'numeric'});
  document.getElementById('cheer-date').textContent = dateStr;
}

// ══ 패널 ══
function togglePanel() {
  document.getElementById('panel-toggle').classList.toggle('open');
  document.getElementById('panel-body').classList.toggle('open');
}

// ══ OFF DAY 추가 ══
function addOffDay() {
  const t = T[lang];
  const dateVal = document.getElementById('offday-date').value;
  const typeVal = document.getElementById('offday-type').value;
  if (!dateVal) { alert(t.dateLabel + '!'); return; }

  const d = keyToDate(dateVal);
  const alertMsgs = {
    ko: { notWork: '그날은 원래 휴무일이야.\n실제 출근일에만 추가할 수 있어.', outOfRange: '오늘 ~ 마지막 출근일 범위 안에서만 추가할 수 있어.', dup: '이미 추가된 날이야.' },
    en: { notWork: "That's already a day off.\nYou can only add leave on work days.", outOfRange: 'Date must be between today and your last working day.', dup: 'Already added.' },
    ja: { notWork: 'その日はもともと休みです。\n出勤日にのみ追加できます。', outOfRange: '今日〜最終出勤日の範囲内で追加してください。', dup: 'すでに追加されています。' },
    es: { notWork: 'Ese día ya es festivo o libre.\nSolo puedes añadir en días laborables.', outOfRange: 'La fecha debe estar entre hoy y tu último día.', dup: 'Este día ya fue añadido.' },
  };
  const am = alertMsgs[lang] || alertMsgs.en;
  if (!isBaseWorkDay(d)) { alert(am.notWork); return; }
  if (d < TODAY || d > cfg.lastDay) { alert(am.outOfRange); return; }
  if (userOffDays[dateVal]) { alert(am.dup); return; }
  userOffDays[dateVal] = typeVal;
  saveData();
  renderAll();
}

function removeOffDay(key) {
  delete userOffDays[key];
  saveData();
  renderAll();
}

// ══ 전체 렌더 ══
function renderAll() {
  renderList();
  renderHeader();
  renderCalendar();
}

function renderList() {
  const t    = T[lang];
  const list = document.getElementById('offday-list');
  const keys = Object.keys(userOffDays).sort();
  list.innerHTML = '';
  if (!keys.length) {
    list.innerHTML = `<div class="empty-hint">${t.emptyHint}</div>`;
    return;
  }
  keys.forEach(k => {
    const type = userOffDays[k];
    const label = type==='annual' ? t.badgeAnnual : t.badgeComp;
    const bc    = type==='annual' ? 'badge-annual' : 'badge-comp';
    const [,m,d] = k.split('-');
    const item = document.createElement('div');
    item.className = 'offday-item';
    item.innerHTML = `
      <div class="item-left">
        <span class="offday-badge ${bc}">${label}</span>
        <span style="font-size:13px;color:var(--text)">${m}/${d}</span>
      </div>
      <button class="remove-btn" onclick="removeOffDay('${k}')">${t.removeBtn}</button>`;
    list.appendChild(item);
  });
}

function renderHeader() {
  const t = T[lang];
  const allWork = [];
  let cur = new Date(TODAY);
  while (cur <= cfg.lastDay) {
    if (isWorkDay(cur)) allWork.push(new Date(cur));
    cur = addDays(cur, 1);
  }
  const total     = allWork.length;
  const done      = allWork.filter(d => d < TODAY).length;
  const scheduledPaidDays = countScheduledPaidDays();
  const flexiblePaidDays = Math.max(0, getPaidDaysRemaining() - scheduledPaidDays);
  const remaining = Math.max(0, total - done - flexiblePaidDays);

  document.getElementById('remaining-count').textContent = remaining;
  document.getElementById('footer-note').textContent = t.footerNote(getPaidDaysRemaining());
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';

  // 응원 메세지
  document.getElementById('cheer-text').innerHTML = t.cheerMsg(remaining, cfg.name);
}

function renderCalendar() {
  const t = T[lang];
  const container = document.getElementById('months-container');
  container.innerHTML = '';

  const startMo = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
  const endMo   = new Date(cfg.lastDay.getFullYear(), cfg.lastDay.getMonth(), 1);

  let cur = new Date(startMo);
  while (cur <= endMo) {
    const year = cur.getFullYear();
    const mo   = cur.getMonth();
    const monthEnd = new Date(year, mo+1, 0);

    const block = document.createElement('div');
    block.className = 'month-block';
    block.innerHTML = `<div class="month-label">${t.monthNames[mo]} ${year}</div>`;

    // 요일 헤더
    const dowRow = document.createElement('div');
    dowRow.className = 'dow-header';
    t.dowLabels.forEach((dl, i) => {
      const c = document.createElement('div');
      c.className = 'dow-cell' + (i===0?' sun':i===6?' sat':'');
      c.textContent = dl;
      dowRow.appendChild(c);
    });
    block.appendChild(dowRow);

    const grid = document.createElement('div');
    grid.className = 'day-grid';

    const startDow = new Date(year, mo, 1).getDay();
    for (let i=0; i<startDow; i++) grid.appendChild(document.createElement('div'));

    for (let day=1; day<=monthEnd.getDate(); day++) {
      const d    = new Date(year, mo, day);
      const key  = dateKey(d);
      const cell = document.createElement('div');
      cell.className = 'day-cell';

      const inRange    = d >= TODAY && d <= cfg.lastDay;
      const isBaseWork = isBaseWorkDay(d);
      const isToday    = sameDay(d, TODAY);
      const userOff    = userOffDays[key];

      if (!inRange) {
        cell.classList.add('off');
        cell.style.opacity = '0.12';
        cell.textContent = day;
      } else if (isToday && isBaseWork && !userOff) {
        cell.classList.add('work-today');
        cell.innerHTML = `<span>📍</span><span class="day-num">${day}</span>`;
      } else if (userOff === 'annual') {
        cell.classList.add('annual-off');
        cell.innerHTML = `<span>${t.badgeAnnual}</span><span class="day-num">${day}</span>`;
      } else if (userOff === 'comp') {
        cell.classList.add('comp-off');
        cell.innerHTML = `<span>${t.badgeComp}</span><span class="day-num">${day}</span>`;
      } else if (isBaseWork) {
        cell.classList.add('work-future');
        cell.innerHTML = `<span class="day-num">${day}</span>`;
      } else if (isHolidayDate(d)) {
        cell.classList.add('holiday-off');
        cell.innerHTML = `<span style="font-size:10px">✦</span><span class="day-num" style="opacity:0.35">${day}</span>`;
      } else {
        cell.classList.add('off');
        cell.textContent = day;
      }

      grid.appendChild(cell);
    }

    block.appendChild(grid);
    container.appendChild(block);
    cur.setMonth(cur.getMonth()+1);
  }
}

// ══ 초기 로드 ══
(function init() {
  if (loadData()) {
    // 저장된 데이터 있으면 바로 메인으로
    buildMainUI();
    showScreen('main');
    renderAll();
  }
  // 없으면 lang picker 화면 유지
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(() => {});
  });
}
</script>
