<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinical Memory Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=20260519-ai-apply-button-top" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-compact">
          <button class="sidebar-logo-btn" id="sidebarToggle" aria-label="사이드바 토글">
            <div class="brand-mark">CM</div>
            <span class="sidebar-app-title">Clinical Memory</span>
          </button>

          <div class="sync-card" id="sidebarAuthCard">
            <div class="sync-status-row">
              <span class="status-dot local" id="syncStatusDot"></span>
              <div>
                <strong id="syncModeLabel">Logged out</strong>
                <span id="syncDetailLabel">로그인 필요</span>
              </div>
            </div>
            <button class="sidebar-auth-button" id="sidebarAuthButton" data-action="open-settings">로그인</button>
          </div>

          <nav class="nav" aria-label="주요 화면">
            <span class="sidebar-section-title">메뉴</span>
            <button class="nav-item active" data-view="dashboard" data-short="Sc" title="Schedule"><i class="ti ti-calendar"></i><span>Schedule</span></button>
            <button class="nav-item" data-view="inbox" data-short="Ib" title="Inbox"><i class="ti ti-inbox"></i><span>Inbox</span></button>
            <button class="nav-item" data-view="patients" data-short="Pt" title="Patients"><i class="ti ti-users"></i><span>Patients</span></button>
            <button class="nav-item" data-view="visits" data-short="Sx" title="Sessions"><i class="ti ti-file-text"></i><span>Sessions</span></button>
            <button class="nav-item" data-view="terms" data-short="Is" title="Insights"><i class="ti ti-chart-bar"></i><span>Insights</span></button>
            <button class="nav-item" data-view="settings" data-short="St" title="Settings"><i class="ti ti-settings"></i><span>Settings</span></button>
          </nav>

          <div class="sidebar-tools">
            <span class="sidebar-section-title">외부 AI</span>
            <button class="sidebar-action tool-item" data-action="open-chatgpt" data-short="AI" title="ChatGPT 열기"><i class="ti ti-sparkles"></i><span>ChatGPT 열기</span></button>
          </div>
        </div>

        <section class="ai-sidebar-panel" aria-label="외부 AI 워크플로우">
          <div class="ai-sidebar-header">
            <h2>외부 AI 워크플로우</h2>
            <div class="ai-sidebar-header-actions">
              <button class="ai-mini-button" data-action="focus-chatgpt">↗ 앞으로 가져오기</button>
              <button class="ai-icon-button" data-action="close-chatgpt-sidebar" aria-label="외부 AI 패널 닫기">×</button>
            </div>
          </div>

          <div class="ai-sidebar-section">
            <h3>1. 프롬프트 복사</h3>
            <button class="ai-copy-button" data-action="copy-import-prompt" data-prompt="scheduleCombined">스케줄 OCR 프롬프트 복사</button>
            <button class="ai-copy-button" data-action="copy-import-prompt" data-prompt="transcriptCleanup">Transcript 정리 프롬프트 복사</button>
            <button class="ai-copy-button" data-action="copy-import-prompt" data-prompt="doctorInitialChart">초진 차트 OCR 프롬프트 복사</button>
          </div>

          <div class="ai-sidebar-section grow">
            <h3>2. 결과 붙여넣기</h3>
            <button class="primary-button" data-action="process-ai-workflow-result">Apply Import</button>
            <textarea id="aiWorkflowResult" placeholder="[VISITS] 또는 [SUBJECTIVE] 또는 [INITIAL_CHART] 결과를 붙여넣기"></textarea>
          </div>
        </section>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <h1 id="viewTitle">오늘</h1>
            <p id="viewSubtitle">스케줄, 녹음, 차트 초안을 한 번에 확인합니다.</p>
          </div>
          <div class="topbar-actions">
            <input id="globalSearch" type="search" placeholder="환자, 증상, 기록 검색" />
            <button class="primary-button sync-top-button" data-action="supabase-upload" title="Save current data to cloud">Cloud Save</button>
            <button class="ghost-button sync-top-button" data-action="supabase-download" title="Load latest cloud data">Load</button>
            <button class="ghost-button" id="exportDataButton" title="JSON 내보내기">Export</button>
            <label class="ghost-button import-label" title="JSON 가져오기">
              Import
              <input id="importDataInput" type="file" accept="application/json" />
            </label>
          </div>
        </header>

        <section class="view active" id="dashboardView"></section>
        <section class="view" id="inboxView"></section>
        <section class="view" id="patientsView"></section>
        <section class="view" id="visitsView"></section>
        <section class="view" id="termsView"></section>
        <section class="view" id="settingsView"></section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <template id="emptyStateTemplate">
      <div class="empty-state">
        <strong></strong>
        <span></span>
      </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="./config.public.js"></script>
    <script src="./prompt-templates.js?v=20260516-schedule-ocr-workday-prompt"></script>
    <script type="module" src="./app.js?v=20260517-chatgpt-bridge"></script>
    <script>
      (function () {
        var sidebar = document.querySelector('.sidebar');
        document.getElementById('sidebarToggle').addEventListener('click', function () {
          document.body.classList.toggle('sidebar-open');
        });
        sidebar.addEventListener('mouseenter', function () {
          document.body.classList.add('sidebar-hover');
        });
        sidebar.addEventListener('mouseleave', function () {
          document.body.classList.remove('sidebar-hover');
        });
      })();
    </script>
  </body>
</html>
